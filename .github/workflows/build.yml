name: Build EXE and Release

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4.1.7

      - name: Setup Python
        uses: actions/setup-python@v5.1.0
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install pyinstaller opencv-python-headless numpy pillow

      - name: Build EXE
        run: |
          pyinstaller 
            --onefile ^
            --noconsole ^
            --icon=icon.ico ^
            --name WaterRemovalApp ^
            main.py

      - name: Prepare Release
        run: |
          mkdir release
          copy dist\WaterRemovalApp.exe release\WaterRemovalApp.exe

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: build-${{ github.run_number }}
          name: Build ${{ github.run_number }}
          files: release/WaterRemovalApp.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
